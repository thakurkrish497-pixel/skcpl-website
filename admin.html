<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | SKCPL Website</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
    }
    h1, h2, h3 {
      font-family: 'Montserrat', sans-serif;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8">

  <!-- Status Notification Container -->
  <div id="status-toast" class="fixed top-4 right-4 max-w-sm w-full p-4 rounded-lg shadow-lg hidden transition-opacity duration-300 z-50 text-white font-medium">
    <span id="status-message"></span>
  </div>

  <!-- AUTHENTICATION VIEW (Visible by default) -->
  <div id="auth-view" class="w-full max-w-md bg-white p-8 rounded-xl shadow-md border border-gray-100 mt-10">
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Admin Access</h2>
      <p class="text-gray-500 text-sm">Sign in to manage website images.</p>
    </div>
    
    <div id="login-form" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input type="email" id="email" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" onkeypress="if(event.key === 'Enter') attemptLogin()">
      </div>
      <button type="button" id="login-btn" onclick="alert('Button was clicked!'); attemptLogin && attemptLogin();" class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition-colors flex justify-center items-center gap-2">
        <span>Sign In</span>
      </button>
    </div>

    <!-- On-screen debug log to help figure out why login might fail -->
    <div class="mt-8 pt-4 border-t border-gray-200">
      <p class="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wider">System Logs</p>
      <div id="debug-log" class="bg-gray-50 p-3 rounded-lg border border-gray-200 text-xs text-gray-600 font-mono h-32 overflow-y-auto whitespace-pre-wrap">Waiting for action...</div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboard-view" class="w-full max-w-5xl bg-white rounded-xl shadow-md border border-gray-100 hidden flex-col overflow-hidden mb-10 mt-6">
    <!-- Header -->
    <div class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold">Image Manager</h1>
      <div class="flex items-center gap-4">
        <span id="user-email" class="text-sm text-gray-300 hidden sm:block"></span>
        <button id="logout-btn" class="text-sm bg-gray-800 hover:bg-gray-700 border border-gray-700 px-4 py-1.5 rounded-md transition-colors">Sign Out</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="p-6 sm:p-8">
      <p class="text-sm text-gray-500 mb-8">Upload a new photo to instantly replace the current one on the live website.</p>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="image-grid">
        <!-- Javascript will inject the image cards here -->
        <div class="col-span-full text-center py-10 text-gray-500">Loading images...</div>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
